name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-browser:
    name: lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/Services/Browser
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/Services/Browser/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check

  typecheck-browser:
    name: typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/Services/Browser
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/Services/Browser/package-lock.json
      - run: npm ci
      - run: npm run typecheck

  build-browser:
    name: build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/Services/Browser
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/Services/Browser/package-lock.json
      - run: npm ci
      - run: npm run build

  lint-frontend:
    name: lint-frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/Frontend
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
      - run: corepack enable && corepack prepare pnpm@latest --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run format:check

  typecheck-frontend:
    name: typecheck-frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/Frontend
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
      - run: corepack enable && corepack prepare pnpm@latest --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck

  build-frontend:
    name: build-frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/Frontend
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
      - run: corepack enable && corepack prepare pnpm@latest --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
